on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  schedule:
    - cron: "9 3 * * *"

name: "Test and Update CVE Records"

permissions:
  contents: read

jobs:
  test_and_update_cve_records:
    runs-on: ubuntu-latest
    if: "${{ vars.CNA_BOT_APP_ID }}"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.CNA_BOT_APP_ID }}
          private-key: ${{ secrets.CNA_BOT_PRIVATE_KEY }}
      - name: CVE RSUS check and upload
        uses: DIVD-NL/cna-bot@32b2dcdec099a157714ba9963572d22c62f70934 # v1.7.0
        with: 
          cve-user: ${{ secrets.CVE_USER }}
          cve-org: ${{ secrets.CVE_ORG }}
          cve-api-key: ${{ secrets.CVE_API_KEY }}
          cve-environment: test
          publish: ${{ github.ref == 'refs/heads/main' }}
          path: records
          reservations-path : records/reservations
          min-reserved: 2
          reserve: 2
          pr: ${{ github.event_name != 'pull_request' }}
          github-token: ${{ steps.app-token.outputs.token }}
          expire-after: "1y"
          # We also allow 3rd party advisories in case of unresponsive hex.pm
          # package maintainers
          ignore: "vendor-advisory"
