on:
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/publish_website.yml'
      - 'records/**/*.json'
      - '!records/reservations/*.json'
      - 'osv/*.json'

name: "Website Update"

permissions:
  contents: read

jobs:
  publish_website:
    name: "Publish CVE Record Changes"
    runs-on: ubuntu-latest
    steps:
      - name: Login for PR
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: website-app-token
        with:
          app-id: ${{ vars.CNA_BOT_APP_ID }}
          private-key: ${{ secrets.CNA_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: 'website'
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Checkout Website
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository_owner }}/website
          token: ${{ steps.website-app-token.outputs.token }}
          path: website

      - name: "Update CVEs in Website"
        shell: bash
        env:
          WEBSITE_CVE_DIR: ${{ vars.WEBSITE_CVE_DIR }}
          WEBSITE_OSV_DIR: ${{ vars.WEBSITE_OSV_DIR }}
        run: |
          mkdir -p \
            "website/${WEBSITE_CVE_DIR}" && \
          find records \
            -path 'records/reservations' -prune \
          -or \
            -type f -name '*.json' \
            -exec cp -f {} "website/${WEBSITE_CVE_DIR}/" \; && \
          mkdir -p \
            "website/${WEBSITE_OSV_DIR}" && \
          find osv \
            -type f -name '*.json' \
            -exec cp -f {} "website/${WEBSITE_OSV_DIR}/" \;
      - name: Commit and push changes
        working-directory: website
        env:
          BOT_APP_SLUG: ${{ vars.CNA_BOT_APP_SLUG }}
          BOT_APP_ID: ${{ vars.CNA_BOT_APP_ID }}
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git config user.name "${BOT_APP_SLUG}[bot]"
          git config user.email "${BOT_APP_ID}+${BOT_APP_SLUG}[bot]@users.noreply.github.com"
          git commit -m "chore(data): sync CVE and OSV JSON from records/"
          git push
