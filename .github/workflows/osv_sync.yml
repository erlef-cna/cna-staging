on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

name: "OSV Auto Sync"

permissions:
  contents: read

jobs:
  update_versions:
    name: "Update OSV Affected Versions"
    runs-on: ubuntu-latest
    steps:
      - name: Login for version updates
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: osv-app-token
        with:
          app-id: ${{ vars.CNA_BOT_APP_ID }}
          private-key: ${{ secrets.CNA_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.osv-app-token.outputs.token }}

      - name: Install Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.1'

      - name: Update OSV versions
        run: './scripts/cve-to-osv update-versions'

      - name: Commit and push changes
        env:
          BOT_APP_SLUG: ${{ vars.CNA_BOT_APP_SLUG }}
          BOT_APP_ID: ${{ vars.CNA_BOT_APP_ID }}
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git config user.name "${BOT_APP_SLUG}[bot]"
          git config user.email "${BOT_APP_ID}+${BOT_APP_SLUG}[bot]@users.noreply.github.com"
          git commit -m "chore(osv): update affected package versions"
          git push